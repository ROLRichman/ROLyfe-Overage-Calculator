<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:12px;}
.container{max-width:720px;margin:auto;}
h1,h2{text-align:center;color:#f43f5e;}

input,select,textarea,button{
width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;font-size:16px;
}

button{background:#f43f5e;color:#fff;font-weight:bold;}

.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}

.good{color:#22c55e;}
.warn{color:#facc15;}
.bad{color:#ef4444;}

.flex{display:flex;gap:10px;}
.flex>*{flex:1;}

.flash{animation:flash 1s infinite;}
@keyframes flash{
0%,50%,100%{color:#f43f5e;}
25%,75%{color:#22c55e;}
}

.links a{display:block;color:#38bdf8;margin:5px 0;}
</style>
</head>

<body>

<div class="container">

<h1>RO’Lyfe Deal Closing Terminal</h1>

<!-- INTAKE -->
<div class="card">
<h2>Deal Intake</h2>

<select id="role">
<option>Who are you?</option>
<option>Investor</option>
<option>Wholesaler</option>
<option>Contractor</option>
<option>Realtor</option>
<option>Buyer</option>
<option>Seller</option>
</select>

<select id="contract">
<option>Do you have a deal under contract?</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="dealType">
<option>Deal Type</option>
<option>Fix & Flip</option>
<option>Wholesale</option>
<option>Buy & Hold</option>
<option>Refinance</option>
</select>

<input id="purchase" placeholder="Purchase Price">
<input id="rehab" placeholder="Estimated Rehab">
<input id="arv" placeholder="ARV (Zestimate)">
<input id="address" value="5503 West Blvd, Youngstown, OH 44512">

<button onclick="openZillow()">Check Zillow</button>

</div>

<!-- INSPECTION -->
<div class="card">
<h2>Inspection / Rehab Estimator</h2>

<input id="roof" placeholder="Roof Repair ($)">
<input id="kitchen" placeholder="Kitchen ($)">
<input id="bath" placeholder="Bathrooms ($)">
<input id="flooring" placeholder="Flooring ($)">
<input id="paint" placeholder="Paint ($)">
<input id="other" placeholder="Other Repairs ($)">

<button onclick="calcRehab()">Calculate Rehab</button>
<div id="rehabOut"></div>

</div>

<!-- DEAL -->
<button onclick="runDeal()">Analyze Deal</button>
<button onclick="resetAll()">Reset</button>

<div id="results"></div>

<!-- OVERAGE -->
<div id="overageBox"></div>

<!-- AGREEMENT -->
<div class="card">
<h2>Offer Agreement Generator</h2>

<input id="buyerName" placeholder="Buyer Name">
<input id="sellerName" placeholder="Seller Name">

<button onclick="generateAgreement()">Generate LOI</button>
<div id="agreement"></div>
</div>

<!-- ACTION -->
<div class="flex">
<button onclick="sendToLO()">Send to Loan Officer</button>
<button onclick="blastInvestors()">Blast Investors</button>
</div>

<button onclick="generatePDF()">Download Deal PDF</button>

<!-- TAX -->
<div class="card">
<h2>Tax Lien</h2>
<input id="lien" value="80000">
<input id="rate" value="12">
<input id="years" value="30">
<button onclick="calcLien()">Calculate</button>
<div id="lienOut"></div>
</div>

<!-- LINKS -->
<div class="links">
<h2>Funding</h2>
<a href="https://form.jotform.com/252063354378055">Funding App</a>
<a href="https://form.jotform.com/253154859148062">Upload Docs</a>
<a href="https://app.sendfuse.com/dashboard">Sendfuse</a>
<a href="#">POF (Coming Soon)</a>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let deal=null;

// Zillow
function openZillow(){
let a=address.value;
window.open("https://www.zillow.com/homes/"+encodeURIComponent(a));
}

// Rehab calc
function calcRehab(){
let total = ["roof","kitchen","bath","flooring","paint","other"]
.reduce((sum,id)=>sum+(parseFloat(document.getElementById(id).value)||0),0);

rehabOut.innerHTML=`<div class="card">Total Rehab: $${total.toLocaleString()}</div>`;
}

// Mortgage
function mortgage(P,r,n){
r=r/100/12;n=n*12;
return P*(r*(1+r)**n)/((1+r)**n-1);
}

// DEAL ENGINE
function runDeal(){

let arv=parseFloat(document.getElementById("arv").value);
let purchase=parseFloat(document.getElementById("purchase").value)||0;
let rehab=parseFloat(document.getElementById("rehab").value)||0;

let totalCost = purchase + rehab;

let cash=arv*0.5;
let carry=arv*0.65;
let finance=arv*0.75;

let spread = arv - totalCost;
let fee = spread * 0.3;

// scoring logic
let score, label, color;

if(spread/arv > 0.4){label="🔥 STEAL";color="good";}
else if(spread/arv > 0.25){label="✅ SOLID";color="warn";}
else{label="⚠️ RISKY";color="bad";}

// payments
let pay= mortgage(carry,5,30);
let pay2= mortgage(finance,6,30);

deal={arv,purchase,rehab,spread,fee,address:address.value};

results.innerHTML=`
<div class="card">
<h3 class="${color}">${label}</h3>

ARV: $${arv.toLocaleString()}<br>
Total Cost: $${totalCost.toLocaleString()}<br>
Spread: $${spread.toLocaleString()}<br>

All Cash: $${cash.toLocaleString()}<br>
Seller Carry: $${carry.toLocaleString()}<br>
Payment: $${pay.toFixed(0)}/mo<br>

Seller Finance: $${finance.toLocaleString()}<br>
Payment: $${pay2.toFixed(0)}/mo<br>

Your Fee: $${fee.toLocaleString()}
</div>
`;

overageBox.innerHTML=`
<div class="card">
Overage Result: $${spread.toLocaleString()}<br>
Your 30% Fee: $${fee.toLocaleString()}
</div>
`;

}

// AGREEMENT
function generateAgreement(){
let buyer=buyerName.value;
let seller=sellerName.value;

agreement.innerHTML=`
<div class="card">
LOI AGREEMENT<br><br>

Buyer: ${buyer}<br>
Seller: ${seller}<br>
Property: ${address.value}<br>
Offer Based On ARV: $${arv.value}<br>

Terms:
- Subject to inspection
- Assignment allowed
- Closing within 30 days

Sign Below:

___________________
Seller Signature

___________________
Buyer Signature
</div>
`;
}

// SEND
function sendToLO(){
window.location.href="mailto:richman@rootoflyfe.com?subject=Deal Submission&body="+address.value;
}

function blastInvestors(){
window.location.href="mailto:?subject=Investor Deal&body="+address.value;
}

// PDF
function generatePDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("RO’Lyfe Deal",10,10);
doc.text(address.value,10,20);

doc.save("deal.pdf");
}

// TAX
function calcLien(){
let l=lien.value,r=rate.value/100,y=years.value;
let t=l*(1+r*y);
lienOut.innerHTML=`<div class="card">$${t.toFixed(0)}</div>`;
}

// RESET
function resetAll(){location.reload();}

</script>

</body>
</html>
