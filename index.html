<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:15px;}
.container {max-width:1100px;margin:auto;}
h1,h2 {text-align:center;color:#f43f5e;}

input,select,button {
  width:100%;padding:10px;margin-top:8px;
  border-radius:6px;border:none;
}

button {background:#f43f5e;color:white;font-weight:bold;}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px;margin-top:20px;
}

.card {
  background:#1e293b;padding:12px;
  border-radius:8px;
}

.good {color:#22c55e;font-weight:bold;}
.bad {color:#ef4444;font-weight:bold;}

.section {margin-top:40px;}
.links a {display:block;color:#38bdf8;margin:4px 0;}
</style>
</head>

<body>

<div class="container">

<img src="your-logo.png" style="display:block;margin:auto;max-height:60px;">

<h1>RO’Lyfe Terminal</h1>

<!-- MODE SWITCH -->
<select id="mode">
  <option value="investor">Investor Mode</option>
  <option value="seller">Seller Mode</option>
</select>

<input id="address" placeholder="Property Address">
<input id="value" placeholder="Estimated Value ($)">

<!-- LEAD CAPTURE -->
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<button onclick="addDeal()">Analyze Deal</button>

<div id="grid" class="grid"></div>

<button onclick="downloadPDF()">Generate Offer PDF</button>

<!-- DEAL SCORE -->
<div id="scoreBox" style="margin-top:20px;text-align:center;"></div>

<!-- TAX LIEN -->
<div class="section">
<h2>Tax Lien Calculator</h2>
<input id="lien" placeholder="Lien Amount">
<input id="rate" placeholder="Interest %">
<input id="years" placeholder="Years">
<button onclick="calcLien()">Calculate</button>
<div id="lienResult"></div>
</div>

<!-- AFFILIATE / FUNDING -->
<div class="section links">
<h2>Funding & Credit Tools</h2>

<a href="https://www.7figurescredit.com/?a_aid=ROLFunding" target="_blank">7Figures Credit</a>
<a href="https://go.mypartner.io/referral-partner/?ref=001Qk00000MkqgTIAR" target="_blank">Corporate Credit Partner</a>
<a href="https://my.americasfundingexperts.com/?id=1820217000190862001" target="_blank">Americas Funding Experts</a>
<a href="https://getyourbizloan.io/lp1?pu=recqKxJNkvD70xMqi" target="_blank">Loan Automation LP1</a>
<a href="https://getyourbizloan.io/lp2?pu=recqKxJNkvD70xMqi" target="_blank">Loan Automation LP2</a>

</div>

<!-- JOTFORMS -->
<div class="section links">
<h2>Applications & Intake</h2>

<a href="https://form.jotform.com/253154859148062" target="_blank">Document Upload</a>
<a href="https://form.jotform.com/252063354378055" target="_blank">Holding Intake</a>
<a href="https://form.jotform.com/252443109820047" target="_blank">Funding Intake</a>
<a href="https://form.jotform.com/2530967310210469" target="_blank">Funding Application</a>
<a href="https://www.jotform.com/agent/019a5b67fad97a4db24b28e44f970158c0f1" target="_blank">AI Agent</a>

</div>

<!-- SEND FUSE -->
<div class="section">
<a href="https://sendfuse.com/login" target="_blank">Sendfuse Dashboard</a>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let deals=[];

function addDeal(){

let address=document.getElementById('address').value;
let value=parseFloat(document.getElementById('value').value);
let mode=document.getElementById('mode').value;

let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let email=document.getElementById('email').value;

if(!address || !value) return alert("Enter data");

// OFFER LOGIC
let offer = mode==="investor" ? value*0.5 : value*0.75;

let overage=value-offer;
let fee=overage*0.3;

// AI SCORE
let score = Math.round((overage/value)*100);

let rating = score > 40 ? "🔥 This deal is a steal"
             : score > 25 ? "✅ Solid Deal"
             : "⚠️ Low Spread";

// SAVE LEAD (local for now)
localStorage.setItem("lead", JSON.stringify({name,phone,email,address}));

let deal={address,value,offer,overage,fee,score,rating};
deals.push(deal);

render();

}

function render(){

let grid=document.getElementById('grid');
grid.innerHTML='';

deals.forEach((d,i)=>{

let card=document.createElement('div');
card.className='card';

card.innerHTML=`
<h3>${d.address}</h3>

Value: $${d.value.toLocaleString()}<br>
Offer: $${d.offer.toLocaleString()}<br>

<div class="good">Overage: $${d.overage.toLocaleString()}</div>
<div class="bad">Your Fee (30%): $${d.fee.toLocaleString()}</div>

<br>
<a href="https://www.zillow.com/homes/${encodeURIComponent(d.address)}" target="_blank">Zillow</a><br>
<a href="https://www.redfin.com/search#address=${encodeURIComponent(d.address)}" target="_blank">Redfin</a>
`;

grid.appendChild(card);

document.getElementById('scoreBox').innerHTML=`
<h2>${d.rating}</h2>
Deal Score: ${d.score}%
`;

});

}

function calcLien(){

let lien=parseFloat(document.getElementById('lien').value);
let rate=parseFloat(document.getElementById('rate').value)/100;
let years=parseFloat(document.getElementById('years').value);

let total=lien*(1+rate*years);
let profit=total-lien;

document.getElementById('lienResult').innerHTML=`
<div class="card">
Total: $${total.toFixed(2)}<br>
Profit: $${profit.toFixed(2)}
</div>`;
}

function downloadPDF(){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

let y=20;

deals.forEach((d,i)=>{
pdf.text(d.address,10,y); y+=10;
pdf.text("Value: "+d.value,10,y); y+=10;
pdf.text("Offer: "+d.offer,10,y); y+=10;
pdf.text("Overage: "+d.overage,10,y); y+=15;
});

pdf.save("ROLyfe_Offer.pdf");

}

</script>

</body>
</html>
