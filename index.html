<!-- Floating AI agent after popup closes -->
<div id="aiFloat" style="position:fixed;bottom:20px;right:20px;background:#f43f5e;padding:10px;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;display:none;" title="AI Assistant" onclick="alert('AI Assistant Active!')">
🤖
</div>

<script>
const aiPopup = document.getElementById('aiPopup');
const aiFloat = document.getElementById('aiFloat');

function closeAIPopup(){
  aiPopup.style.display='none';
  aiFloat.style.display='flex';
}
document.querySelector('#aiPopup .close').onclick = closeAIPopup;
</script>

<!-- Role selection -->
<select id="role" onchange="roleChange()">
  <option value="">Who are you?</option>
  <option value="contractor">Contractor</option>
  <option value="realtor">Realtor</option>
  <option value="flipper">Flipper</option>
  <option value="buyer">Buyer</option>
  <option value="seller">Seller</option>
  <option value="investor">Investor</option>
</select>

<!-- Property under contract question -->
<select id="propertyContract" style="display:none;" onchange="propertyContractChange()">
  <option value="">Do you have property under contract?</option>
  <option value="yes">Yes</option>
  <option value="no">No</option>
</select>

<script>
function roleChange(){
  const role = document.getElementById('role').value;
  if(role) document.getElementById('propertyContract').style.display='block';
  else document.getElementById('propertyContract').style.display='none';
}

function propertyContractChange(){
  const val = document.getElementById('propertyContract').value;
  if(val==='yes'){
    alert('Display follow-up questions dynamically here for property info, repairs, sellers, etc.');
  }
}
</script>

<!-- Investor Blast Section -->

<textarea id="investorList" placeholder="Enter emails or numbers (comma separated)"></textarea>
<button onclick="blastDeal()">Send Deal PDF to Investors</button>

<script>
function blastDeal(){
  const list=document.getElementById('investorList').value;
  if(!list) return alert('Enter investors emails / numbers');
  alert('Deal PDF will be sent to: '+list);
  // Here integrate SMS/email API
}
</script>

<!-- PDF Download Page Button -->
<button onclick="generateFullPagePDF()">Download Full Deal Page PDF</button>

<script>
function generateFullPagePDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("RO'Lyfe Full Deal Page",10,10);
  // Include all sections: Analyzer, Repairs, Overage, Roles, Photos
  doc.text(document.getElementById('results').innerText,10,20);
  doc.save("ROLyfe_Full_Deal.pdf");
}
</script>
