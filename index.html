<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:10px;}
.container{max-width:760px;margin:auto;}

h1,h2{text-align:center;color:#f43f5e;}

.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:15px;
box-sizing:border-box;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.full{grid-column:1/-1;}

button{background:#f43f5e;color:#fff;font-weight:bold;}

.good{color:#22c55e;}
.warn{color:#facc15;}
.bad{color:#ef4444;}

canvas{width:100%;height:140px;background:#fff;border-radius:8px;}
</style>
</head>

<body>
<div class="container">

<h1>RO’Lyfe Deal Closing Terminal</h1>

<!-- DEAL INPUT -->
<div class="card">
<h2>Deal Analyzer</h2>

<div class="grid">
<input id="purchase" placeholder="Purchase Price">
<input id="rehab" placeholder="Rehab">
<input id="arv" placeholder="ARV (Zestimate)">
<input id="address" value="2109 W Nedro Ave, Philadelphia, PA 19138">
</div>

<button onclick="openZillow()">Check Zillow</button>
<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>
</div>

<!-- AGREEMENT -->
<div class="card">
<h2>Purchase & Sale Agreement</h2>

<input id="buyer" value="Richardson L." placeholder="Buyer">
<input id="seller" placeholder="Seller Name">
<input id="price" placeholder="Auto Filled">

<br><br>

<h3>Buyer Signature</h3>
<canvas id="sigBuyer"></canvas>

<h3 style="margin-top:20px;">Seller Signature</h3>
<canvas id="sigSeller"></canvas>

<button onclick="clearSig()">Clear Signatures</button>
<button onclick="buildContract()">Generate Agreement</button>

<div id="agreement"></div>
</div>

<!-- ACTIONS -->
<div class="grid">
<button onclick="sendEmail()">Email Deal</button>
<button onclick="sendText()">Text Deal</button>
<button onclick="blast()">Investor Blast</button>
<button onclick="sendToSeller()">Send to Seller</button>
</div>

<button onclick="generateContractPDF()">Download Agreement PDF</button>
<button onclick="generateInvestorPDF()">Download Investor Sheet</button>
<button onclick="generatePOF()">Generate POF Letter</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// GLOBAL DATA
let deal = {};
let contractText = "";

// ZILLOW
function openZillow(){
window.open("https://www.zillow.com/homes/"+encodeURIComponent(address.value));
}

// SIGNATURE SYSTEM
function setupCanvas(id){
let c=document.getElementById(id);
let ctx=c.getContext("2d");
let drawing=false;

c.addEventListener("mousedown",()=>drawing=true);
c.addEventListener("mouseup",()=>drawing=false);
c.addEventListener("mousemove",(e)=>{
if(!drawing) return;
ctx.lineWidth=2;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

c.addEventListener("touchmove",(e)=>{
let rect=c.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;
ctx.lineTo(x,y);
ctx.stroke();
});
}

setupCanvas("sigBuyer");
setupCanvas("sigSeller");

function clearSig(){
["sigBuyer","sigSeller"].forEach(id=>{
let c=document.getElementById(id);
c.getContext("2d").clearRect(0,0,c.width,c.height);
});
}

// DEAL ENGINE
function runDeal(){

let arvV = +arv.value;
let purchaseV = +purchase.value;
let rehabV = +rehab.value;

let total = purchaseV + rehabV;
let spread = arvV - total;
let fee = spread * 0.3;

let label="⚠️ LOW";
if(spread/arvV > 0.4) label="🔥 STEAL";
else if(spread/arvV > 0.25) label="✅ SOLID";

deal = {arv:arvV,purchase:purchaseV,rehab:rehabV,spread,fee,address:address.value};

price.value = purchaseV; // AUTO FILL CONTRACT

let text = `
${label}
ARV: $${arvV.toLocaleString()}
Total Cost: $${total.toLocaleString()}
Spread: $${spread.toLocaleString()}
Your Fee: $${fee.toLocaleString()}
`;

results.innerHTML = `<div class="card"><pre>${text}</pre></div>`;
window.dealText = text;
}

// CONTRACT BUILDER
function buildContract(){

contractText = `
PURCHASE & SALE AGREEMENT

Property: ${deal.address}
Seller: ${seller.value}
Buyer: ${buyer.value} and/or Assigns

Purchase Price: $${price.value}
Earnest Money Deposit: $500 (to be held by title company)

Inspection Period: 14 days
Closing: 30 days or sooner
Condition: Property sold AS-IS

Assignment Clause:
Buyer may assign without seller consent.

Additional Clause:
Buyer may work with funding partners.

--------------------------------------

SIGNATURES

BUYER: ${buyer.value}
SELLER: ${seller.value}
`;

agreement.innerHTML = `<div class="card"><pre>${contractText}</pre></div>`;
}

// SEND
function sendEmail(){
window.location.href=`mailto:richman@rootoflyfe.com?subject=Deal&body=${encodeURIComponent(contractText)}`;
}

function sendText(){
window.location.href=`sms:2158085844?body=${encodeURIComponent(contractText)}`;
}

function blast(){
window.location.href=`mailto:?subject=Investor Deal&body=${encodeURIComponent(dealText)}`;
}

// SEND TO SELLER (REMOTE SIGN)
function sendToSeller(){
let sellerPhone = prompt("Enter Seller Phone:");
if(!sellerPhone) return;
window.location.href=`sms:${sellerPhone}?body=${encodeURIComponent("Please review and sign your agreement: "+deal.address)}`;
}

// CONTRACT PDF
function generateContractPDF(){

const {jsPDF} = window.jspdf;
let doc = new jsPDF();

doc.text(contractText,10,10);

// SIGNATURE IMAGES
let bSig = document.getElementById("sigBuyer").toDataURL();
let sSig = document.getElementById("sigSeller").toDataURL();

doc.addImage(bSig,'PNG',10,200,80,30);
doc.addImage(sSig,'PNG',110,200,80,30);

doc.save("ROLYFE_AGREEMENT.pdf");
}

// INVESTOR SHEET
function generateInvestorPDF(){

const {jsPDF} = window.jspdf;
let doc = new jsPDF();

doc.text("INVESTOR DEAL SHEET",10,10);
doc.text(dealText,10,20);

doc.save("INVESTOR_DEAL.pdf");
}

// POF
function generatePOF(){

const {jsPDF} = window.jspdf;
let doc = new jsPDF();

doc.text("PROOF OF FUNDS LETTER",10,10);
doc.text(`Property: ${deal.address}`,10,20);
doc.text(`Amount: $${deal.arv.toLocaleString()}`,10,30);

doc.save("POF.pdf");
}

</script>

</body>
</html>
