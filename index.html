<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:12px;}
.container{max-width:720px;margin:auto;}
h1,h2{text-align:center;color:#f43f5e;}

input,select,textarea,button{
width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;font-size:16px;
}

button{background:#f43f5e;color:#fff;font-weight:bold;}

.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}
.good{color:#22c55e;}
.bad{color:#ef4444;}

.flex{display:flex;gap:10px;}
.flex > *{flex:1;}

.links a{display:block;color:#38bdf8;margin:5px 0;}

.flash{animation:flash 1s infinite;}
@keyframes flash{
0%,50%,100%{color:#f43f5e;}
25%,75%{color:#22c55e;}
}
</style>
</head>

<body>

<div class="container">

<h1>RO’Lyfe Deal Closing Terminal</h1>

<img src="your-logo.png" style="width:140px;display:block;margin:auto;">

<!-- INTAKE -->
<div class="card">
<h2>Quick Deal Intake</h2>

<select id="role">
<option>Who are you?</option>
<option>Investor</option>
<option>Wholesaler</option>
<option>Contractor</option>
<option>Realtor</option>
<option>Buyer</option>
<option>Seller</option>
</select>

<select id="contract">
<option>Do you have a deal under contract?</option>
<option>Yes</option>
<option>No</option>
</select>

<input id="purchase" placeholder="Purchase Price / Amount Owed">
<input id="rehab" placeholder="Rehab Cost">
<input id="asIs" placeholder="As-Is Value">
<input id="credit" placeholder="Credit Score">
<textarea id="notes" placeholder="Deal Notes"></textarea>

</div>

<!-- PROPERTY -->
<h2>Property Analyzer</h2>

<input id="address" value="5503 West Blvd, Youngstown, OH 44512">
<button onclick="openZillow()">Check Zillow</button>

<input id="arv" value="309900" placeholder="Paste ARV">

<div class="flex">
<button onclick="runDeal()">Analyze</button>
<button onclick="resetAll()">Reset</button>
</div>

<div id="results"></div>

<!-- OVERAGE -->
<h2>Overage Breakdown</h2>
<div id="overageBox"></div>

<!-- ACTION -->
<div class="flex">
<button onclick="sendText()">Text</button>
<button onclick="sendEmail()">Email</button>
</div>
<button onclick="sendInvestor()">Send to Investors</button>
<button onclick="generatePDF()">Generate PDF</button>

<!-- SAVED -->
<h2>Saved Deals</h2>
<div id="saved"></div>

<!-- TAX -->
<h2>Tax Lien Calculator</h2>
<input id="lien" value="80000">
<input id="rate" value="12">
<input id="years" value="30">
<button onclick="calcLien()">Calculate</button>
<div id="lienOut"></div>

<!-- LINKS -->
<h2>Funding Links</h2>
<div class="links">
<a href="https://form.jotform.com/252063354378055">Funding Application</a>
<a href="https://form.jotform.com/253154859148062">Document Upload</a>
<a href="https://app.sendfuse.com/dashboard">Sendfuse</a>
</div>

<!-- DROPBOX -->
<div class="card">
<h2>Upload Docs</h2>
<iframe src="https://form.jotform.com/253154859148062"
style="width:100%;height:400px;border:none;"></iframe>
</div>

</div>

<!-- AI AGENT -->
<div id="agent" style="position:fixed;bottom:20px;right:20px;width:350px;background:#111;padding:10px;border-radius:10px;display:none;">
<iframe src="https://www.jotform.com/agent/019a5b67fad97a4db24b28e44f970158c0f1"
style="width:100%;height:400px;border:none;"></iframe>
<button onclick="closeAgent()">Close</button>
</div>

<button onclick="openAgent()" style="position:fixed;bottom:20px;right:20px;">AI</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let deals = JSON.parse(localStorage.getItem("deals")) || [];
let currentDeal = null;

// Zillow
function openZillow(){
let a = document.getElementById("address").value;
window.open("https://www.zillow.com/homes/"+encodeURIComponent(a));
}

// Mortgage
function mortgage(P,r,n){
r=r/100/12;
n=n*12;
return P*(r*(1+r)**n)/((1+r)**n-1);
}

// RUN DEAL
function runDeal(){

let arv = parseFloat(document.getElementById("arv").value);
let address = document.getElementById("address").value;

if(!arv) return alert("Enter ARV");

// Offers
let cash = arv * 0.5;
let carry = arv * 0.65;
let finance = arv * 0.75;

// Carry terms
let down = carry * 0.05;
let loan = carry - down;
let pay = mortgage(loan,5,30);
let balloon = loan - (pay * 48);

// Finance terms
let pay2 = mortgage(finance,6,30);
let balloon2 = finance - (pay2 * 60);

// Overage
let spread = arv - cash;
let fee = spread * 0.3;

// SCORE
let score = (spread / arv) * 100;
let label = score > 40 ? "🔥 STEAL" : score > 25 ? "✅ GOOD" : "⚠️ LOW";

currentDeal = {address,arv,cash,carry,finance,pay,pay2,down,balloon,balloon2,fee};

deals.push(currentDeal);
localStorage.setItem("deals",JSON.stringify(deals));

// RESULT
document.getElementById("results").innerHTML = `
<div class="card">
<h3>${address} <span class="flash">${label}</span></h3>
ARV: $${arv.toLocaleString()}<br><br>

All Cash: $${cash.toLocaleString()}<br>
Seller Carry: $${carry.toLocaleString()}<br>
Down: $${down.toFixed(0)}<br>
Payment: $${pay.toFixed(0)}/mo<br>
Balloon: $${balloon.toFixed(0)}<br><br>

Seller Finance: $${finance.toLocaleString()}<br>
Payment: $${pay2.toFixed(0)}/mo<br>
Balloon: $${balloon2.toFixed(0)}<br><br>

Overage Fee: $${fee.toFixed(0)}
</div>
`;

// OVERAGE BOX
document.getElementById("overageBox").innerHTML = `
<div class="card">
Overage Spread: $${spread.toLocaleString()}<br>
Your Fee (30%): $${fee.toLocaleString()}
</div>
`;

renderSaved();
}

// SAVED CLEAN
function renderSaved(){
let s=document.getElementById("saved");
s.innerHTML="";

let unique=[...new Map(deals.map(d=>[d.address,d])).values()];

unique.forEach(d=>{
s.innerHTML += `<div class="card">${d.address} - $${d.arv.toLocaleString()}</div>`;
});
}

// TEXT
function sendText(){
if(!currentDeal) return;
window.location.href=`sms:2158085844?body=${currentDeal.address}`;
}

// EMAIL
function sendEmail(){
if(!currentDeal) return;
window.location.href=`mailto:richman@rootoflyfe.com?subject=Deal&body=${currentDeal.address}`;
}

// INVESTOR
function sendInvestor(){
if(!currentDeal) return;
window.location.href=`mailto:?subject=Deal&body=${currentDeal.address}`;
}

// PDF
function generatePDF(){
if(!currentDeal) return;

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("RO’Lyfe Deal",10,10);
doc.text(currentDeal.address,10,20);
doc.text("ARV: "+currentDeal.arv,10,30);
doc.text("Cash: "+currentDeal.cash,10,40);
doc.text("Fee: "+currentDeal.fee,10,50);

doc.save("deal.pdf");
}

// TAX
function calcLien(){
let l = parseFloat(lien.value);
let r = parseFloat(rate.value)/100;
let y = parseFloat(years.value);
let t = l*(1+r*y);
lienOut.innerHTML = `<div class="card">Total $${t.toFixed(0)}</div>`;
}

// RESET
function resetAll(){location.reload();}

// AI
function openAgent(){agent.style.display="block";}
function closeAgent(){agent.style.display="none";}

renderSaved();

</script>

</body>
</html>
