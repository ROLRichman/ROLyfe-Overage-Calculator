<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:10px;}
.container{max-width:760px;margin:auto;}

h1,h2{text-align:center;color:#f43f5e;}

.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}

input,textarea,button{
width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;font-size:15px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{background:#f43f5e;color:#fff;font-weight:bold;}

.good{color:#22c55e;}
.warn{color:#facc15;}
.bad{color:#ef4444;}

.sigText{
font-family:'Pacifico',cursive;
font-size:22px;
color:#000;
background:#fff;
padding:8px;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>RO’Lyfe Deal Closing Terminal</h1>

<!-- DEAL -->
<div class="card">
<h2>Deal Analyzer</h2>

<input id="address" value="2109 W Nedro Ave, Philadelphia, PA 19138">
<input id="purchase" placeholder="Purchase Price">
<input id="rehab" placeholder="Rehab">
<input id="arv" placeholder="ARV">

<button onclick="openZillow()">Check Zillow</button>
<button onclick="voiceInput()">🎤 Voice Input</button>
<button onclick="runDeal()">Analyze Deal</button>

<div id="results"></div>
</div>

<!-- OVERAGE -->
<div id="overage"></div>

<!-- OVERAGE CALCULATOR -->
<div class="card">
<h2>Overage Calculator</h2>

<input id="o_arv" placeholder="ARV">
<button onclick="calcOverage()">Calculate</button>

<div id="overageCalc"></div>
</div>

<!-- AGREEMENT -->
<div class="card">
<h2>Purchase & Sale Agreement</h2>

<input id="buyer" value="Richardson L.">
<input id="seller" placeholder="Seller Name">
<input id="price" placeholder="Auto Filled">

<h3>Type Signature</h3>
<input id="buyerSigInput" placeholder="Type Buyer Name">
<div id="buyerSig" class="sigText"></div>

<input id="sellerSigInput" placeholder="Type Seller Name">
<div id="sellerSig" class="sigText"></div>

<button onclick="buildContract()">Generate Agreement</button>

<div id="agreement"></div>
</div>

<!-- ACTIONS -->
<div class="grid">
<button onclick="sendText()">Text</button>
<button onclick="sendEmail()">Email</button>
<button onclick="blast()">Investor Blast</button>
<button onclick="generatePDF()">Agreement PDF</button>
<button onclick="investorPDF()">Investor PDF</button>
<button onclick="pofPDF()">POF</button>
</div>

<!-- TAX -->
<div class="card">
<h2>Tax Lien</h2>
<input id="lien" value="80000">
<input id="rate" value="12">
<input id="years" value="30">
<button onclick="calcLien()">Calculate</button>
<div id="lienOut"></div>
</div>

<!-- UPLOAD -->
<div class="card">
<h2>Upload Files</h2>
<iframe src="https://form.jotform.com/253154859148062" style="width:100%;height:400px;border:none;"></iframe>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let dealText="";
let contractText="";

// ZILLOW
function openZillow(){
window.open("https://www.zillow.com/homes/"+encodeURIComponent(address.value));
}

// VOICE INPUT
function voiceInput(){
let rec = new webkitSpeechRecognition();
rec.onresult = e => {
let t = e.results[0][0].transcript;
address.value = t;
};
rec.start();
}

// DEAL
function runDeal(){

let arvV=+arv.value;
let purchaseV=+purchase.value;
let rehabV=+rehab.value;

let total=purchaseV+rehabV;
let spread=arvV-total;
let fee=spread*0.3;

let cash=arvV*0.5;
let carry=arvV*0.65;
let fin=arvV*0.75;

let label="⚠️ LOW";
if(spread/arvV>0.4) label="🔥 STEAL";
else if(spread/arvV>0.25) label="✅ SOLID";

dealText=`${label}
ARV: $${arvV.toLocaleString()}
Total Cost: $${total.toLocaleString()}
Spread: $${spread.toLocaleString()}
Your Fee: $${fee.toLocaleString()}

--- OFFERS ---
All Cash: $${cash.toLocaleString()}
Seller Carry: $${carry.toLocaleString()}
Seller Finance: $${fin.toLocaleString()}
`;

price.value=purchaseV;

results.innerHTML=`<div class="card"><pre>${dealText}</pre></div>`;

overage.innerHTML=`<div class="card">
<h3>Overage</h3>
<pre>${dealText}</pre>
</div>`;
}

// OVERAGE CALC
function calcOverage(){
let arvV=+o_arv.value;
let cash=arvV*0.5;
let carry=arvV*0.65;
let fin=arvV*0.75;

overageCalc.innerHTML=`
<div class="card">
ARV: $${arvV.toLocaleString()}
All Cash: $${cash.toLocaleString()}
Seller Carry: $${carry.toLocaleString()}
Seller Financing: $${fin.toLocaleString()}
Overage Result: $${(arvV-carry).toLocaleString()}
</div>`;
}

// CONTRACT
function buildContract(){

buyerSig.innerText=buyerSigInput.value;
sellerSig.innerText=sellerSigInput.value;

contractText=`
PURCHASE & SALE AGREEMENT

Property: ${address.value}
Seller: ${seller.value}
Buyer: ${buyer.value} and/or Assigns

Purchase Price: $${price.value}
Earnest Money Deposit: $500 (to be held by title company)

Inspection Period: 14 days
Closing: 30 days or sooner
Condition: Property sold AS-IS

Assignment Clause:
Buyer may assign without seller consent.

Additional Clause:
Buyer may work with funding partners.

--------------------------------------

SIGNATURES

BUYER: ${buyer.value}
SELLER: ${seller.value}
`;

agreement.innerHTML=`<div class="card"><pre>${contractText}</pre></div>`;
}

// SEND
function sendText(){
window.location.href=`sms:2158085844?body=${encodeURIComponent(contractText)}`;
}
function sendEmail(){
window.location.href=`mailto:richman@rootoflyfe.com?body=${encodeURIComponent(contractText)}`;
}
function blast(){
let emails=prompt("Enter emails comma separated:");
window.location.href=`mailto:${emails}?body=${encodeURIComponent(dealText)}`;
}

// PDF
function generatePDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(contractText,10,10);
doc.save("Agreement.pdf");
}

function investorPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(dealText,10,10);
doc.save("Investor.pdf");
}

function pofPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("PROOF OF FUNDS",10,10);
doc.text(address.value,10,20);
doc.save("POF.pdf");
}

// TAX
function calcLien(){
let t=lien.value*(1+(rate.value/100)*years.value);
lienOut.innerHTML=`<div class="card">$${t.toFixed(0)}</div>`;
}

</script>

</body>
</html>
