<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:12px;}
.container {max-width:900px;margin:auto;}
h1,h2 {text-align:center;color:#f43f5e;}
input,select,button,textarea {width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;font-size:16px;}
button {background:#f43f5e;color:white;font-weight:bold;cursor:pointer;}
.card {background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}
.flex {display:flex;gap:10px;}
.flex>*{flex:1;}
.signature-pad {border:1px solid #ccc;height:150px;border-radius:10px;}
#aiFloat {position:fixed;bottom:20px;right:20px;background:#f43f5e;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;display:none;}
.popup {position:fixed;top:20px;right:20px;background:#1e293b;padding:20px;border-radius:10px;}
.flash {animation:flash 1s infinite;}
@keyframes flash {0%,100%{color:#f43f5e;}50%{color:#22c55e;}}
</style>
</head>

<body>
<div class="container">

<h1>RO’Lyfe Deal Closing Terminal</h1>

<!-- AI POPUP -->
<div id="aiPopup" class="popup">
🤖 AI Deal Assistant Ready
<button onclick="closeAI()">X</button>
</div>

<div id="aiFloat" onclick="openAI()">🤖</div>

<h2>Property Analyzer</h2>

<input id="address" value="5503 West Blvd, Youngstown, OH 44512">
<button onclick="openZillow()">Check Zillow</button>

<input id="arv" value="356600">

<select id="role">
<option>Who are you?</option>
<option>Contractor</option>
<option>Investor</option>
<option>Seller</option>
<option>Buyer</option>
<option>Realtor</option>
</select>

<select id="contractStatus">
<option>Property under contract?</option>
<option>Yes</option>
<option>No</option>
</select>

<div class="flex">
<input id="buyer" placeholder="Buyer Name">
<input id="seller" placeholder="Seller Name">
</div>

<div class="flex">
<button onclick="runDeal()">Analyze Deal</button>
<button onclick="resetAll()">Reset</button>
</div>

<div id="results"></div>

<h2>Repair Estimator</h2>
<div class="flex">
<input id="roof" value="10000">
<input id="hvac" value="10000">
</div>
<div class="flex">
<input id="paint" value="10000">
<input id="floor" value="10000">
</div>
<div class="flex">
<input id="plumb" value="10000">
<input id="other" value="10000">
</div>
<button onclick="calcRepairs()">Calculate Repairs</button>
<div id="repairsOut" class="card"></div>

<h2>Sign Contract</h2>
<input id="buyerSign" placeholder="Type Signature">
<canvas id="buyerPad" class="signature-pad"></canvas>

<input id="sellerSign" placeholder="Seller Type Signature">
<canvas id="sellerPad" class="signature-pad"></canvas>

<button onclick="clearPads()">Clear Signatures</button>

<button onclick="generateContract()">Generate PSA PDF</button>

<h2>Investor Blast</h2>
<textarea id="investors" placeholder="emails or phone numbers"></textarea>
<button onclick="blast()">Send Deal</button>

<button onclick="generateInvestor()">Generate Investor PDF</button>
<button onclick="fullPDF()">Download Full Page PDF</button>

<h2>Upload Docs</h2>
<iframe src="https://form.jotform.com/253154859148062" style="width:100%;height:400px;border:none;"></iframe>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>

const buyerPad = new SignaturePad(document.getElementById('buyerPad'));
const sellerPad = new SignaturePad(document.getElementById('sellerPad'));

function clearPads(){
buyerPad.clear();
sellerPad.clear();
}

function closeAI(){
document.getElementById('aiPopup').style.display='none';
document.getElementById('aiFloat').style.display='flex';
}
function openAI(){
document.getElementById('aiPopup').style.display='block';
document.getElementById('aiFloat').style.display='none';
}

function openZillow(){
let a=document.getElementById("address").value;
window.open("https://www.zillow.com/homes/"+encodeURIComponent(a));
}

function runDeal(){
let arv=+document.getElementById("arv").value;

let cash=arv*0.5;
let carry=arv*0.65;
let finance=arv*0.75;

let spread=arv-230000;
let fee=spread*0.3;

document.getElementById("results").innerHTML=`
<div class="card">
<h3 class="flash">🔥 SOLID DEAL</h3>
ARV: $${arv.toLocaleString()}<br>
Spread: $${spread.toLocaleString()}<br>
Your Fee: $${fee.toLocaleString()}<br><br>
All Cash: $${cash.toLocaleString()}<br>
Seller Carry: $${carry.toLocaleString()}<br>
Seller Finance: $${finance.toLocaleString()}
</div>`;
}

function calcRepairs(){
let total = ["roof","hvac","paint","floor","plumb","other"]
.reduce((t,id)=>t+(+document.getElementById(id).value||0),0);
document.getElementById("repairsOut").innerHTML=`Total Repairs: $${total}`;
}

function generateContract(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let buyer=document.getElementById("buyer").value;
let seller=document.getElementById("seller").value;
let prop=document.getElementById("address").value;

doc.text("PURCHASE & SALE AGREEMENT",10,10);
doc.text(`Property: ${prop}`,10,20);
doc.text(`Seller: ${seller}`,10,30);
doc.text(`Buyer: ${buyer}`,10,40);

doc.text("Condition: AS-IS | Assignment Allowed",10,60);

if(!buyerPad.isEmpty())
doc.addImage(buyerPad.toDataURL(),'PNG',10,80,60,20);

if(!sellerPad.isEmpty())
doc.addImage(sellerPad.toDataURL(),'PNG',120,80,60,20);

doc.save("PSA.pdf");
}

function generateInvestor(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("INVESTOR DEAL SHEET",10,10);
doc.text(document.getElementById("results").innerText,10,20);
doc.text(document.getElementById("repairsOut").innerText,10,40);

doc.save("Investor.pdf");
}

function fullPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(document.body.innerText,10,10);
doc.save("FullDeal.pdf");
}

function blast(){
let data=document.getElementById("investors").value;
alert("Sending deal to: "+data);
}

function resetAll(){location.reload();}

</script>

</body>
</html>
