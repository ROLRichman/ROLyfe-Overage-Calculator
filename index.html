<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:12px;}
.container {max-width:900px;margin:auto;}
h1,h2 {text-align:center;color:#f43f5e;}

input,select,button {
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button {background:#f43f5e;color:white;font-weight:bold;cursor:pointer;}
.card {background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}

.flex {display:flex;gap:10px;}
.flex > * {flex:1;}

.flash {animation:flash 1s infinite;}
@keyframes flash {
0%,100% {color:#f43f5e;}
50% {color:#22c55e;}
}

canvas {background:#fff;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>
<div class="container">

<h1>RO’Lyfe Deal Terminal</h1>

<!-- PROPERTY -->
<h2>Property Analyzer</h2>

<input id="address" value="5503 West Blvd, Youngstown, OH 44512">
<button onclick="openZillow()">Check Zillow</button>

<input id="arv" value="356600">

<div class="flex">
<input id="buyer" placeholder="Buyer Name">
<input id="seller" placeholder="Seller Name">
</div>

<div class="flex">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
</div>

<button onclick="runDeal()">Analyze Deal</button>
<button onclick="resetAll()">Reset</button>

<div id="results"></div>

<!-- REPAIRS -->
<h2>Repair / Inspection Estimator</h2>

<div class="flex">
<input id="roof" value="10000">
<input id="hvac" value="10000">
</div>

<div class="flex">
<input id="paint" value="10000">
<input id="flooring" value="10000">
</div>

<div class="flex">
<input id="plumbing" value="10000">
<input id="other" value="10000">
</div>

<button onclick="calcRepairs()">Calculate Repairs</button>
<div id="repairsOut"></div>

<!-- OVERAGE -->
<h2>Overage Breakdown</h2>
<div id="overageBox" class="card"></div>

<!-- SIGN -->
<h2>Sign Contract</h2>

<input id="buyerSign" placeholder="Type Buyer Name">
<input id="sellerSign" placeholder="Type Seller Name">

<canvas id="sigPad" width="300" height="150"></canvas>
<button onclick="clearSig()">Clear Signature</button>

<!-- ACTIONS -->
<h2>Actions</h2>

<button onclick="sendText()">Text Deal</button>
<button onclick="sendEmail()">Email Deal</button>
<button onclick="generateContract()">Generate PSA PDF</button>
<button onclick="generatePDF()">Investor Deal PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>

let currentDeal = {};
const sigPad = new SignaturePad(document.getElementById("sigPad"));

function openZillow(){
let a=document.getElementById("address").value;
window.open("https://www.zillow.com/homes/"+encodeURIComponent(a));
}

// 🔥 DEAL ANALYZER (FIXED REAL LOGIC)
function runDeal(){

let arv=parseFloat(document.getElementById("arv").value);
let address=document.getElementById("address").value;

if(!arv || !address){
alert("Enter address & ARV");
return;
}

// OFFERS
let cash=arv*0.5;
let carry=arv*0.65;
let finance=arv*0.75;

// REPAIRS
let repairs = calcRepairs(true);

// TOTAL COST
let totalCost = cash + repairs;

// SPREAD
let spread = arv - totalCost;

// YOUR FEE (30%)
let fee = spread * 0.3;

// SAVE
currentDeal = {address,arv,cash,carry,finance,repairs,totalCost,spread,fee};

// RESULT UI
document.getElementById("results").innerHTML=`
<div class="card">
<h3 class="flash">🔥 SOLID DEAL</h3>

<p>ARV: $${arv.toLocaleString()}</p>
<p>Total Cost: $${totalCost.toLocaleString()}</p>
<p>Repairs: $${repairs.toLocaleString()}</p>

<p>Spread: $${spread.toLocaleString()}</p>
<p>Your Fee: $${fee.toLocaleString()}</p>

<hr>

<p>All Cash: $${cash.toLocaleString()}</p>
<p>Seller Carry: $${carry.toLocaleString()}</p>
<p>Seller Finance: $${finance.toLocaleString()}</p>
</div>`;

// OVERAGE BOX
document.getElementById("overageBox").innerHTML=`
<p><b>Overage Result:</b> $${spread.toLocaleString()}</p>
<p><b>Your 30% Fee:</b> $${fee.toLocaleString()}</p>
`;

}

// 🔧 REPAIRS
function calcRepairs(silent=false){
let total=0;
["roof","hvac","paint","flooring","plumbing","other"].forEach(id=>{
total+=parseFloat(document.getElementById(id).value)||0;
});

if(!silent){
document.getElementById("repairsOut").innerHTML=
`<div class="card">Total Repairs: $${total.toLocaleString()}</div>`;
}

return total;
}

// TEXT
function sendText(){
if(!currentDeal.address) return alert("Run deal first");

let msg=`Deal:
${currentDeal.address}
ARV: ${currentDeal.arv}
Spread: ${currentDeal.spread}
Fee: ${currentDeal.fee}`;

window.location.href=`sms:?body=${encodeURIComponent(msg)}`;
}

// EMAIL
function sendEmail(){
if(!currentDeal.address) return alert("Run deal first");

let msg=`Deal:
${currentDeal.address}
ARV: ${currentDeal.arv}
Spread: ${currentDeal.spread}
Fee: ${currentDeal.fee}`;

window.location.href=`mailto:?subject=Deal&body=${encodeURIComponent(msg)}`;
}

// CONTRACT (FIXED SELLER + SIGNATURE)
function generateContract(){

if(!currentDeal.address) return alert("Run deal first");

let buyer=document.getElementById("buyer").value;
let seller=document.getElementById("seller").value;

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("PURCHASE & SALE AGREEMENT",10,10);
doc.text(`Property: ${currentDeal.address}`,10,20);
doc.text(`Seller: ${seller}`,10,30);
doc.text(`Buyer: ${buyer}`,10,40);

doc.text(`Purchase Price: $${currentDeal.cash.toLocaleString()}`,10,50);
doc.text(`Earnest Deposit: $500`,10,60);
doc.text(`Inspection: 14 Days`,10,70);
doc.text(`Closing: 30 Days`,10,80);
doc.text(`Condition: AS-IS`,10,90);

doc.text("Assignment Allowed",10,100);

doc.text("Buyer Signature: "+document.getElementById("buyerSign").value,10,120);
doc.text("Seller Signature: "+document.getElementById("sellerSign").value,10,130);

// DRAW SIGNATURE
let img = sigPad.toDataURL();
doc.addImage(img,'PNG',10,140,60,30);

doc.save("PSA.pdf");
}

// INVESTOR PDF (FULL NOW)
function generatePDF(){

if(!currentDeal.address) return alert("Run deal first");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("INVESTOR DEAL SHEET",10,10);

doc.text(`Property: ${currentDeal.address}`,10,20);
doc.text(`ARV: $${currentDeal.arv}`,10,30);
doc.text(`Repairs: $${currentDeal.repairs}`,10,40);

doc.text(`Total Cost: $${currentDeal.totalCost}`,10,50);
doc.text(`Spread: $${currentDeal.spread}`,10,60);
doc.text(`Your Fee: $${currentDeal.fee}`,10,70);

doc.text(`All Cash: $${currentDeal.cash}`,10,90);
doc.text(`Seller Carry: $${currentDeal.carry}`,10,100);
doc.text(`Seller Finance: $${currentDeal.finance}`,10,110);

doc.save("Investor_Deal.pdf");
}

// SIGNATURE
function clearSig(){sigPad.clear();}

// RESET
function resetAll(){location.reload();}

</script>

</body>
</html>
