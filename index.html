<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Deal Closing Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:Roboto;background:#0f172a;color:#fff;margin:0;padding:12px;}
.container {max-width:900px;margin:auto;}
h1,h2 {text-align:center;color:#f43f5e;}

input,select,button,textarea {
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button {background:#f43f5e;color:white;font-weight:bold;cursor:pointer;}
.card {background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;}
.flex {display:flex;gap:10px;}
.flex > * {flex:1;}
.good {color:#22c55e;}
.flash {animation:flash 1s infinite;}

@keyframes flash {
0%,100% {color:#f43f5e;}
50% {color:#22c55e;}
}

canvas {background:#fff;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>
<div class="container">

<h1>RO’Lyfe Deal Terminal</h1>

<!-- PROPERTY -->
<h2>Property Analyzer</h2>

<input id="address" value="5503 West Blvd, Youngstown, OH 44512">
<button onclick="openZillow()">Check Zillow</button>

<input id="arv" value="356600">

<div class="flex">
<input id="buyer" placeholder="Buyer Name">
<input id="seller" placeholder="Seller Name">
</div>

<div class="flex">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
</div>

<button onclick="analyzeDeal()">Analyze Deal</button>
<button onclick="resetPage()">Reset</button>

<div id="results"></div>

<!-- REPAIRS -->
<h2>Repair Estimator</h2>

<div class="flex">
<input id="roof" value="10000">
<input id="hvac" value="10000">
</div>

<div class="flex">
<input id="paint" value="10000">
<input id="floor" value="10000">
</div>

<div class="flex">
<input id="plumbing" value="10000">
<input id="other" value="10000">
</div>

<button onclick="calcRepairs()">Calculate Repairs</button>
<div id="repairsOut"></div>

<!-- SIGN -->
<h2>Sign Contract</h2>

<input id="buyerSign" placeholder="Type Buyer Name">
<input id="sellerSign" placeholder="Type Seller Name">

<canvas id="pad" width="300" height="150"></canvas>
<button onclick="clearSig()">Clear Signature</button>

<!-- ACTIONS -->
<h2>Actions</h2>

<button onclick="sendText()">Text Deal</button>
<button onclick="sendEmail()">Email Deal</button>
<button onclick="generatePSA()">Generate PSA PDF</button>
<button onclick="generateInvestor()">Investor Deal PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
let deal = {};
const pad = new SignaturePad(document.getElementById("pad"));

function openZillow(){
let a=document.getElementById("address").value;
window.open("https://www.zillow.com/homes/"+encodeURIComponent(a));
}

function analyzeDeal(){
let arv=parseFloat(arvInput.value||document.getElementById("arv").value);

let cash=arv*0.5;
let carry=arv*0.65;
let finance=arv*0.75;

let spread=arv - 230000;
let fee=spread*0.3;

deal={
address:address.value,
arv,cash,carry,finance,spread,fee
};

results.innerHTML=`
<div class="card">
<h3 class="flash">🔥 SOLID DEAL</h3>
<p>ARV: $${arv.toLocaleString()}</p>
<p>Total Cost: $230,000</p>
<p>Spread: $${spread.toLocaleString()}</p>
<p>Your Fee: $${fee.toLocaleString()}</p>

<hr>

<p>All Cash: $${cash.toLocaleString()}</p>
<p>Seller Carry: $${carry.toLocaleString()}</p>
<p>Seller Finance: $${finance.toLocaleString()}</p>
</div>
`;
}

function calcRepairs(){
let total=0;
["roof","hvac","paint","floor","plumbing","other"].forEach(id=>{
total+=parseFloat(document.getElementById(id).value)||0;
});
repairsOut.innerHTML=`<div class="card">Repairs: $${total}</div>`;
deal.repairs=total;
}

function sendText(){
let msg=`Deal ${deal.address} ARV $${deal.arv} Spread $${deal.spread}`;
window.location.href=`sms:?body=${encodeURIComponent(msg)}`;
}

function sendEmail(){
let msg=`Deal:
${deal.address}
ARV: ${deal.arv}
Spread: ${deal.spread}
Fee: ${deal.fee}`;

window.location.href=`mailto:?subject=Deal&body=${encodeURIComponent(msg)}`;
}

function generatePSA(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("PURCHASE & SALE AGREEMENT",10,10);
doc.text(`Property: ${deal.address}`,10,20);
doc.text(`Seller: ${seller.value}`,10,30);
doc.text(`Buyer: ${buyer.value}`,10,40);
doc.text(`Price: $${deal.cash}`,10,50);
doc.text("Inspection: 14 days",10,60);
doc.text("Closing: 30 days",10,70);
doc.text("AS-IS",10,80);

doc.text("Buyer Signature: "+buyerSign.value,10,100);
doc.text("Seller Signature: "+sellerSign.value,10,110);

let img = pad.toDataURL();
doc.addImage(img,'PNG',10,120,60,30);

doc.save("PSA.pdf");
}

function generateInvestor(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

doc.text("INVESTOR DEAL SHEET",10,10);
doc.text(`Property: ${deal.address}`,10,20);
doc.text(`ARV: $${deal.arv}`,10,30);
doc.text(`Spread: $${deal.spread}`,10,40);
doc.text(`Fee: $${deal.fee}`,10,50);
doc.text(`Repairs: $${deal.repairs||0}`,10,60);

doc.save("Investor.pdf");
}

function clearSig(){pad.clear();}
function resetPage(){location.reload();}
</script>

</body>
</html>
